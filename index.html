<head>
<meta charset="UTF-8">

<title>GitHub Trending - 2026-07-06</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/geist@1.3.1/dist/fonts/geist-mono/style.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.31.0/dist/tabler-icons.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>

<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#fafafa;--bg-card:rgba(255,255,255,0.72);--bg-card-solid:#fff;
  --border:rgba(0,0,0,0.06);--border-hover:rgba(0,0,0,0.12);
  --text-primary:#0a0a0a;--text-secondary:#52525b;--text-muted:#a1a1aa;
  --accent:#2563eb;--accent-light:rgba(37,99,235,0.08);--accent-glow:rgba(37,99,235,0.15);
  --r-card:16px;--r-sm:10px;--r-pill:999px;
  --font-sans:'Geist Sans',-apple-system,BlinkMacSystemFont,sans-serif;
  --font-mono:'Geist Mono','SF Mono',monospace;
  --shadow-sm:0 1px 2px rgba(0,0,0,0.04),0 1px 3px rgba(0,0,0,0.06);
  --shadow-md:0 4px 12px rgba(0,0,0,0.06),0 2px 4px rgba(0,0,0,0.04);
  --shadow-lg:0 8px 30px rgba(0,0,0,0.08),0 4px 12px rgba(0,0,0,0.04);
  --shadow-xl:0 20px 60px rgba(0,0,0,0.1),0 8px 20px rgba(0,0,0,0.06);
}
html{scroll-behavior:smooth;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
body{background:var(--bg);color:var(--text-primary);font-family:var(--font-sans);line-height:1.6;min-height:100dvh;overflow-x:hidden}
a{color:inherit;text-decoration:none}
button{font-family:inherit;border:none;cursor:pointer;background:none}
@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:0.01ms!important;transition-duration:0.01ms!important}}

/* ===== MESH GRADIENT BG ===== */
.mesh-bg{position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none}
.mesh-blob{position:absolute;border-radius:50%;filter:blur(120px);opacity:0.5;will-change:transform}
.blob-1{width:600px;height:600px;background:radial-gradient(circle,#93c5fd,#bfdbfe);top:-10%;left:-5%}
.blob-2{width:500px;height:500px;background:radial-gradient(circle,#a5b4fc,#c7d2fe);top:30%;right:-10%}
.blob-3{width:450px;height:450px;background:radial-gradient(circle,#6ee7b7,#a7f3d0);bottom:10%;left:20%}
.blob-4{width:350px;height:350px;background:radial-gradient(circle,#fbbf24,#fde68a);top:60%;left:50%}

/* ===== NOISE OVERLAY ===== */
.noise{position:fixed;inset:0;z-index:1;pointer-events:none;opacity:0.03;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-repeat:repeat;background-size:256px 256px}

/* ===== LAYOUT ===== */
.page{max-width:1200px;margin:0 auto;padding:0 24px;position:relative;z-index:2}

/* ===== HEADER (glass) ===== */
.header{position:sticky;top:0;z-index:50;
  background:rgba(250,250,250,0.7);
  backdrop-filter:blur(20px) saturate(1.8);
  -webkit-backdrop-filter:blur(20px) saturate(1.8);
  border-bottom:1px solid var(--border)}
.header-inner{max-width:1200px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:64px;gap:16px;padding:0 24px}
.brand{display:flex;align-items:center;gap:12px}
.brand-icon{width:36px;height:36px;background:linear-gradient(135deg,#2563eb,#7c3aed);border-radius:10px;display:grid;place-items:center;color:#fff;font-size:18px;box-shadow:0 4px 14px rgba(37,99,235,0.3)}
.brand-title{font-size:16px;font-weight:700;letter-spacing:-0.03em;color:var(--text-primary)}
.brand-date{font-size:11px;color:var(--text-muted);font-family:var(--font-mono);letter-spacing:0.02em}
.header-right{display:flex;align-items:center;gap:16px}
.stat-pill{display:flex;align-items:center;gap:8px;padding:6px 14px;background:var(--accent-light);border:1px solid rgba(37,99,235,0.12);border-radius:var(--r-pill);font-size:12px;color:var(--accent);font-weight:600}
.stat-pill i{font-size:14px}
/* ===== HERO ===== */
.hero{padding:80px 0 48px;text-align:center}
.hero-badge{display:inline-flex;align-items:center;gap:6px;padding:6px 16px;background:var(--bg-card);backdrop-filter:blur(12px);border:1px solid var(--border);border-radius:var(--r-pill);font-size:12px;color:var(--text-secondary);font-weight:500;margin-bottom:20px;box-shadow:var(--shadow-sm)}
.hero-badge .dot{width:6px;height:6px;border-radius:50%;background:#22c55e;animation:pulse-dot 2s ease-in-out infinite}
@keyframes pulse-dot{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.5;transform:scale(0.8)}}
.hero h1{font-size:clamp(2.5rem,6vw,4.2rem);font-weight:800;letter-spacing:-0.04em;line-height:1.05;color:var(--text-primary);margin-bottom:16px}
.hero h1 span{background:linear-gradient(135deg,#2563eb,#7c3aed);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hero-sub{font-size:clamp(0.95rem,2vw,1.15rem);color:var(--text-secondary);max-width:520px;margin:0 auto;line-height:1.7}
/* Stats row */
.hero-stats{display:flex;justify-content:center;gap:32px;margin-top:36px}
.hero-stat{text-align:center}
.hero-stat-val{font-size:clamp(1.8rem,4vw,2.8rem);font-weight:800;letter-spacing:-0.04em;font-family:var(--font-mono);color:var(--text-primary);line-height:1}
.hero-stat-label{font-size:12px;color:var(--text-muted);margin-top:4px;font-weight:500}
.hero-stat-divider{width:1px;height:40px;background:var(--border);align-self:center}

/* ===== TABS ===== */
.tabs-wrap{display:flex;align-items:center;justify-content:center;gap:12px;margin:12px 0 8px;flex-wrap:wrap}
.tabs{display:inline-flex;gap:3px;background:var(--bg-card-solid);border:1px solid var(--border);border-radius:var(--r-pill);padding:4px;box-shadow:var(--shadow-sm)}
.tab{padding:8px 22px;border-radius:var(--r-pill);font-size:13px;font-weight:500;color:var(--text-muted);transition:all 0.35s cubic-bezier(0.16,1,0.3,1);display:flex;align-items:center;gap:6px;position:relative;overflow:hidden}
.tab::before{content:'';position:absolute;inset:0;border-radius:inherit;background:var(--accent);opacity:0;transition:opacity 0.35s cubic-bezier(0.16,1,0.3,1);z-index:0}
.tab:hover{color:var(--text-secondary)}
.tab.active{color:#fff;font-weight:600}
.tab.active::before{opacity:1}
.tab i,.tab span{position:relative;z-index:1}
.tab i{font-size:15px}
.tab-meta{font-size:12px;color:var(--text-muted);font-family:var(--font-mono)}

/* ===== PANEL TRANSITION ===== */
.panel-wrap{position:relative;min-height:400px}
.panel{display:none;opacity:0}
.panel.active{display:block;opacity:1}

/* ===== FEATURED GRID ===== */
.featured{display:grid;grid-template-columns:1.15fr 1fr 1fr;gap:16px;padding:20px 0}
.feat-card{background:var(--bg-card);backdrop-filter:blur(16px) saturate(1.6);-webkit-backdrop-filter:blur(16px) saturate(1.6);border:1px solid var(--border);border-radius:var(--r-card);padding:24px;display:flex;flex-direction:column;gap:10px;position:relative;overflow:hidden;transition:all 0.4s cubic-bezier(0.16,1,0.3,1);box-shadow:var(--shadow-sm);transform-style:preserve-3d;perspective:800px}
.feat-card:hover{box-shadow:var(--shadow-xl);border-color:var(--border-hover)}
.feat-card .shine{position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(circle at var(--mx,50%) var(--my,50%),rgba(255,255,255,0.15) 0%,transparent 50%);pointer-events:none;opacity:0;transition:opacity 0.4s;z-index:1}
.feat-card:hover .shine{opacity:1}
.feat-rank{position:absolute;top:14px;right:14px;font-size:12px;font-weight:800;width:28px;height:28px;border-radius:8px;display:grid;place-items:center;color:#fff;z-index:2}
.rank-1{background:linear-gradient(135deg,#f59e0b,#d97706);box-shadow:0 4px 14px rgba(245,158,11,0.35)}
.rank-2{background:linear-gradient(135deg,#94a3b8,#64748b);box-shadow:0 4px 14px rgba(148,163,184,0.3)}
.rank-3{background:linear-gradient(135deg,#d97706,#b45309);box-shadow:0 4px 14px rgba(217,119,6,0.3)}
.feat-name{font-size:14px;font-weight:600;padding-right:40px;position:relative;z-index:2}
.feat-name a{color:var(--accent);display:inline-flex;align-items:center;gap:5px;transition:color 0.2s}
.feat-name a:hover{color:#1d4ed8}
.feat-name i{font-size:12px;opacity:0.5}
.feat-desc{font-size:13px;color:var(--text-secondary);line-height:1.7;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;flex:1;position:relative;z-index:2}
.feat-card:first-child .feat-desc{-webkit-line-clamp:4}
.feat-meta{display:flex;align-items:center;gap:12px;font-size:11px;font-family:var(--font-mono);position:relative;z-index:2}
.feat-stars{color:#eab308;font-weight:700;display:inline-flex;align-items:center;gap:3px}
.feat-stars i{font-size:13px}
.feat-forks{color:var(--text-muted);display:inline-flex;align-items:center;gap:3px}
.feat-forks i{font-size:13px}
.feat-lang{margin-left:auto;display:inline-flex;align-items:center;gap:5px;padding:2px 9px;background:rgba(0,0,0,0.04);border-radius:var(--r-pill);font-size:11px;color:var(--text-secondary);border:1px solid rgba(0,0,0,0.04)}
.lang-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}

/* ===== REPO LIST ===== */
.repo-list{display:flex;flex-direction:column;background:var(--bg-card);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:1px solid var(--border);border-radius:var(--r-card);overflow:hidden;box-shadow:var(--shadow-sm)}
.repo-row{display:grid;grid-template-columns:36px 1fr auto;gap:12px;align-items:start;padding:14px 20px;border-bottom:1px solid rgba(0,0,0,0.04);transition:background 0.25s;position:relative}
.repo-row:last-child{border-bottom:none}
.repo-row::before{content:'';position:absolute;inset:0;background:radial-gradient(600px circle at var(--row-x,50%) var(--row-y,50%),rgba(37,99,235,0.04),transparent 40%);opacity:0;transition:opacity 0.4s;pointer-events:none}
.repo-row:hover::before{opacity:1}
.repo-row:hover{background:rgba(255,255,255,0.5)}
.repo-rank{font-size:12px;font-weight:700;font-family:var(--font-mono);color:var(--text-muted);text-align:center;padding-top:2px}
.repo-info{display:flex;flex-direction:column;gap:3px;min-width:0}
.repo-name{font-size:13px;font-weight:600;display:flex;align-items:center;gap:5px}
.repo-name a{color:var(--accent);display:inline-flex;align-items:center;gap:4px;transition:color 0.2s}
.repo-name a:hover{color:#1d4ed8}
.repo-name i{font-size:11px;opacity:0.4}
.repo-desc{font-size:12px;color:var(--text-secondary);line-height:1.65;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.repo-right{display:flex;align-items:center;gap:12px;font-size:11px;font-family:var(--font-mono);white-space:nowrap;padding-top:2px}
.repo-stars{color:#eab308;font-weight:700;display:inline-flex;align-items:center;gap:3px}
.repo-stars i{font-size:12px}
.repo-forks{color:var(--text-muted);display:inline-flex;align-items:center;gap:3px}
.repo-forks i{font-size:12px}
.repo-lang{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;background:rgba(0,0,0,0.03);border-radius:var(--r-pill);font-size:10px;color:var(--text-secondary);border:1px solid rgba(0,0,0,0.04)}

/* ===== LANG MARQUEE ===== */
.lang-marquee{overflow:hidden;padding:24px 0;mask-image:linear-gradient(90deg,transparent,#000 10%,#000 90%,transparent);-webkit-mask-image:linear-gradient(90deg,transparent,#000 10%,#000 90%,transparent)}
.marquee-track{display:flex;gap:12px;width:max-content;animation:marquee 30s linear infinite}
.marquee-track:hover{animation-play-state:paused}
@keyframes marquee{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
.lang-tag{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;background:var(--bg-card-solid);border:1px solid var(--border);border-radius:var(--r-pill);font-size:12px;font-weight:500;color:var(--text-secondary);white-space:nowrap;transition:border-color 0.2s,box-shadow 0.2s}
.lang-tag:hover{border-color:var(--accent-glow);box-shadow:0 2px 12px rgba(37,99,235,0.1)}

/* ===== FOOTER ===== */
.footer{border-top:1px solid var(--border);padding:28px 0;text-align:center;font-size:12px;color:var(--text-muted);position:relative;z-index:2;background:rgba(250,250,250,0.8);backdrop-filter:blur(12px)}
.footer a{color:var(--accent);font-weight:500;transition:color 0.2s}
.footer a:hover{color:#1d4ed8}
.footer-brand{margin-top:6px;font-size:11px}

/* ===== SCROLL REVEAL ===== */
.reveal{opacity:0;transform:translateY(20px)}

/* ===== RESPONSIVE ===== */
@media(max-width:900px){
  .featured{grid-template-columns:1fr}
  .feat-card:first-child .feat-desc{-webkit-line-clamp:3}
}
@media(max-width:640px){
  .page{padding:0 16px}
  .header-inner{height:56px;padding:0 16px}
  .header-right{display:none}
  .brand-title{font-size:14px}
  .hero{padding:48px 0 32px}
  .hero-stats{gap:20px}
  .hero-stat-divider{height:30px}
  .tabs-wrap{margin:8px 0 4px}
  .tab{padding:7px 14px;font-size:12px}
  .tab-meta{display:none}
  .featured{padding:12px 0;gap:12px}
  .feat-card{padding:18px}
  .repo-row{grid-template-columns:28px 1fr;padding:12px 14px}
  .repo-right{display:none}
}
</style>
</head>

// ===== RENDER =====
function renderFeatured(panelId){
  const container=document.getElementById(panelId+'-featured');
  if(container.children.length>0)return;
  const items=DATA[panelId].featured;
  items.forEach(r=>{
    const c=document.createElement('div');
    c.className='feat-card reveal';
    const lc=LANG_COLORS[r.lang]||'#71717a';
    c.innerHTML=`
      <div class="shine"></div>
      <div class="feat-rank rank-${r.rank}">${r.rank}</div>
      <div class="feat-name"><a href="https://github.com/${r.slug}" target="_blank" rel="noopener"><i class="ti ti-external-link"></i>${r.slug}</a></div>
      <div class="feat-desc">${r.desc}</div>
      <div class="feat-meta">
        <span class="feat-stars"><i class="ti ti-star-filled"></i>${r.stars}</span>
        <span class="feat-forks"><i class="ti ti-git-fork"></i>${r.forks}</span>
        <span class="feat-lang"><span class="lang-dot" style="background:${lc}"></span>${r.lang}</span>
      </div>`;
    container.appendChild(c);
  });
  initTiltCards(container);
  revealItems(container.querySelectorAll('.feat-card'));
}

function renderList(panelId){
  const container=document.getElementById(panelId+'-list');
  if(container.children.length>0)return;
  const items=DATA[panelId].list;
  items.forEach((r,i)=>{
    const row=document.createElement('div');
    row.className='repo-row reveal';
    row.style.setProperty('--idx',i);
    const lc=LANG_COLORS[r.lang]||'#71717a';
    row.innerHTML=`
      <div class="repo-rank">${r.rank}</div>
      <div class="repo-info">
        <div class="repo-name"><a href="https://github.com/${r.slug}" target="_blank" rel="noopener"><i class="ti ti-external-link"></i>${r.slug}</a></div>
        <div class="repo-desc">${r.desc}</div>
      </div>
      <div class="repo-right">
        <span class="repo-stars"><i class="ti ti-star-filled"></i>${r.stars}</span>
        <span class="repo-forks"><i class="ti ti-git-fork"></i>${r.forks}</span>
        ${r.lang?`<span class="repo-lang"><span class="lang-dot" style="background:${lc}"></span>${r.lang}</span>`:''}
      </div>`;
    container.appendChild(row);
  });
  revealItems(container.querySelectorAll('.repo-row'));
}

// ===== 3D TILT =====
function initTiltCards(container){
  container.querySelectorAll('.feat-card').forEach(card=>{
    card.addEventListener('mousemove',e=>{
      const r=card.getBoundingClientRect();
      const x=(e.clientX-r.left)/r.width;
      const y=(e.clientY-r.top)/r.height;
      const rotX=(y-0.5)*-8;
      const rotY=(x-0.5)*8;
      card.style.transform=`perspective(800px) rotateX(${rotX}deg) rotateY(${rotY}deg) scale(1.01)`;
      card.style.setProperty('--mx',(x*100)+'%');
      card.style.setProperty('--my',(y*100)+'%');
    });
    card.addEventListener('mouseleave',()=>{
      card.style.transform='perspective(800px) rotateX(0) rotateY(0) scale(1)';
    });
  });
}

// ===== SPOTLIGHT ON LIST ROWS =====
document.addEventListener('mousemove',e=>{
  document.querySelectorAll('.repo-row').forEach(row=>{
    const r=row.getBoundingClientRect();
    row.style.setProperty('--row-x',(e.clientX-r.left)+'px');
    row.style.setProperty('--row-y',(e.clientY-r.top)+'px');
  });
});

// ===== GSAP REVEAL =====
gsap.registerPlugin(ScrollTrigger);
function revealItems(els){
  gsap.fromTo(els,
    {opacity:0,y:24},
    {opacity:1,y:0,duration:0.6,stagger:0.06,ease:'power3.out',
     scrollTrigger:{trigger:els[0],start:'top 90%',once:true}}
  );
}

// Hero animations
window.addEventListener('DOMContentLoaded',()=>{
  // Counter animation
  document.querySelectorAll('[data-count]').forEach(el=>{
    const target=parseInt(el.dataset.count);
    gsap.to({val:0},{
      val:target,duration:1.5,ease:'power2.out',delay:0.3,
      onUpdate:function(){el.textContent=Math.round(this.targets()[0].val)}
    });
  });

  // Hero stagger
  gsap.from('.hero-badge',{opacity:0,y:20,duration:0.7,ease:'power3.out',delay:0.1});
  gsap.from('.hero h1',{opacity:0,y:30,duration:0.8,ease:'power3.out',delay:0.2});
  gsap.from('.hero-sub',{opacity:0,y:20,duration:0.7,ease:'power3.out',delay:0.35});
  gsap.from('.hero-stats',{opacity:0,y:20,duration:0.7,ease:'power3.out',delay:0.5});
  gsap.from('.tabs-wrap',{opacity:0,y:15,duration:0.6,ease:'power3.out',delay:0.6});

  // Blob float
  gsap.to('.blob-1',{x:40,y:30,duration:8,ease:'sine.inOut',yoyo:true,repeat:-1});
  gsap.to('.blob-2',{x:-30,y:-40,duration:10,ease:'sine.inOut',yoyo:true,repeat:-1});
  gsap.to('.blob-3',{x:50,y:-20,duration:9,ease:'sine.inOut',yoyo:true,repeat:-1});
  gsap.to('.blob-4',{x:-40,y:30,duration:11,ease:'sine.inOut',yoyo:true,repeat:-1});

  // Initial render
  renderFeatured('daily');
  renderList('daily');
});

// ===== TAB SWITCH =====
let currentPanel='daily';
document.querySelectorAll('.tab').forEach(btn=>{
  btn.addEventListener('click',()=>{
    const pid=btn.dataset.panel;
    if(pid===currentPanel)return;
    const oldPanel=document.getElementById(currentPanel);
    const newPanel=document.getElementById(pid);
    // Fade out
    gsap.to(oldPanel,{opacity:0,duration:0.2,ease:'power2.in',onComplete:()=>{
      oldPanel.classList.remove('active');
      newPanel.classList.add('active');
      gsap.fromTo(newPanel,{opacity:0},{opacity:1,duration:0.3,ease:'power2.out'});
      currentPanel=pid;
      renderFeatured(pid);
      renderList(pid);
    }});
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    btn.classList.add('active');
  });
});

// ===== LANG MARQUEE =====
(function(){
  const langs=Object.keys(LANG_COLORS);
  const track=document.getElementById('marquee-track');
  // Duplicate for seamless loop
  const content=[...langs,...langs].map(l=>{
    const c=LANG_COLORS[l];
    return `<span class="lang-tag"><span class="lang-dot" style="background:${c}"></span>${l}</span>`;
  }).join('');
  track.innerHTML=content;
})();
